<!-- Sflib Record Action Config -->
<template>
    <lightning-card title="Record Action Settings" icon-name="custom:custom67">
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </template>

            <lightning-input
                    type="toggle"
                    label="Enable History Log"
                    name="historyLog"
                    message-toggle-active="Enabled"
                    message-toggle-inactive="Disabled"
                    checked={historyLog}
                    onchange={handleHistoryLogChange}>
            </lightning-input>

            <lightning-input
                    type="toggle"
                    label="Use 24 hour clock"
                    message-toggle-active="24 Hour"
                    message-toggle-inactive="AM/PM"
                    name="militaryTime"
                    checked={militaryTime}
                    disabled={disableMilitaryTimeOption}
                    onchange={handleMilitaryTimeChange}>
            </lightning-input>

            <lightning-input
                    type="toggle"
                    label="Highlight active and used actions"
                    name="highlight"
                    checked={highlight}
                    disabled={disableHighlightOption}
                    onchange={handleHighlightChange}>
            </lightning-input>

            <lightning-input
                    type="toggle"
                    label="See & Execute All Actions"
                    name="seeAll"
                    checked={seeAll}
                    onchange={handleSeeAllChange}>
            </lightning-input>

        </div>
    </lightning-card>
</template>
