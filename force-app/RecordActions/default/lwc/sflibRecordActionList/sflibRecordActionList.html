<!-- Sflib Record Action List -->
<template>
    <template lwc:if={showSpinner}>
        <div class="slds-is-relative slds-p-top_large slds-p-bottom_large">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <template lwc:else>

        <!-- Search bar -->

        <template lwc:if={showSearchBar}>
            <div class="slds-p-left_small slds-p-right_small slds-m-bottom_small">
                <lightning-input
                        label="Search"
                        name="enter-search"
                        type="search"
                        variant="label-hidden"
                        onchange={handleSearch}
                ></lightning-input>
            </div>
        </template>

        <!-- Record Action List -->
        <div class="slds-grid slds-wrap slds-p-left_x-small slds-p-right_x-small">
            <template for:each={paginatedData} for:item="action" key={action.actionId}>
                <div class={className} key={action.actionId}>
                    <c-sflib-record-action
                            action-id={action.actionId}
                            record-id={recordId}
                            variant={variant}
                            state={action.state}
                            onchangestatus={handleActionStatusChange}
                    ></c-sflib-record-action>
                </div>
            </template>
        </div>

        <!--- Pagination --->
        <div class="slds-align_absolute-center slds-m-top_medium" lwc:if={showPagination}>
            <lightning-button label="Previous" onclick={handlePrevious}
                              disabled={isPreviousDisabled}></lightning-button>
            <span class="slds-m-horizontal_medium">{currentPage} of {totalPages}</span>
            <lightning-button label="Next" onclick={handleNext} disabled={isNextDisabled}></lightning-button>
        </div>
    </template>
</template>
