<!-- Sflib Record Action -->
<template>
    <template lwc:if={showTiles}>
        <div class="slds-card slds-card_boundary slds-m-around_small">
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name={iconName} size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title">
                            <span class="slds-card__header-title slds-truncate">{title}</span>
                        </h2>
                    </div>
                </header>
            </div>
            <div class="slds-card__body slds-card__body_inner">
                <div class="content"
                     style="-webkit-line-clamp: 4; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;">
                    {description}
                </div>
                <a class="read-more-btn slds-text-align_right" if:true={showReadMore} onclick={handleToggleReadMore}>
                    Read More
                </a>
            </div>
            <footer class="slds-card__footer">
                <lightning-button
                        variant={buttonVariant}
                        label={startButtonTitle}
                        title={startButtonTitle}
                        onclick={handleClick}
                        stretch="true"
                ></lightning-button>
            </footer>
        </div>
    </template>

    <!-- Show a list of buttons -->
    <template lwc:else>
        <lightning-button
                variant={buttonVariant}
                icon-name={iconName}
                label={buttonTitle}
                title={buttonTitle}
                onclick={handleClick}
                stretch="true"
        ></lightning-button>
    </template>

    <!-- Flow modal -->
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">{title}</h2>
                    <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close"></lightning-icon>
                    </button>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow
                            flow-api-name={flowName}
                            flow-input-variables={flowVariables}
                            onstatuschange={handleFlowStatusChange}>
                    </lightning-flow>
                </div>
<!--                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseModal}></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={handleCloseModal}></lightning-button>
                </footer>-->
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
