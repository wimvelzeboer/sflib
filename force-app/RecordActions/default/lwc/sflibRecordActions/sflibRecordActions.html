<!-- SFLib Record Actions -->
<template>
    <lightning-card title={title} icon-name={iconName}>
        <div slot="actions" lwc:if={showMenu}>
            <lightning-button-menu alternative-text="Show Options" variant="bare" menu-alignment="right">
                <lightning-menu-item
                        lwc:if={historyEnabled}
                        value="Show History"
                        label="Show History"
                        onclick={handleShowHistory}
                        icon-name="utility:archive"
                ></lightning-menu-item>
                <lightning-menu-item
                        lwc:if={isAdministrator}
                        value="Settings"
                        label="Settings"
                        icon-name="utility:settings"
                        onclick={handleShowSettings}
                ></lightning-menu-item>
            </lightning-button-menu>
        </div>
        <div class="slds-grid slds-wrap slds-p-left_x-small slds-p-right_x-small">
            <template for:each={actionIds} for:item="actionId">
                <div class={className} key={actionId}>
                    <c-sflib-record-action
                            action-id={actionId}
                            record-id={recordId}
                            variant={variant}
                            onchangestatus={handleActionStatusChange}
                    ></c-sflib-record-action>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
