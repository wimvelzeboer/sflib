<!-- SFLib Record Actions -->
<template>
    <lightning-card title={title} icon-name={iconName}>
        <div slot="actions" lwc:if={showMenu}>
            <lightning-button-menu alternative-text="Show Options" variant="bare" menu-alignment="right">
                <lightning-menu-item
                        lwc:if={historyEnabled}
                        value="Show History"
                        label="Show History"
                        onclick={handleShowHistory}
                        icon-name="utility:archive"
                ></lightning-menu-item>
                <lightning-menu-item
                        lwc:if={isAdministrator}
                        value="Settings"
                        label="Settings"
                        icon-name="utility:settings"
                        onclick={handleShowSettings}
                ></lightning-menu-item>
            </lightning-button-menu>
        </div>
        <div class="slds-grid slds-wrap slds-p-left_x-small slds-p-right_x-small">
            <template for:each={paginatedData} for:item="action" key={action.actionId}>
                <div class={className} key={action.actionId}>
                    <c-sflib-record-action
                            action-id={action.actionId}
                            record-id={recordId}
                            variant={variant}
                            state={action.state}
                            onchangestatus={handleActionStatusChange}
                    ></c-sflib-record-action>
                </div>
            </template>
        </div>

        <!--- Pagination --->
        <div class="slds-align_absolute-center slds-m-top_medium">
            <lightning-button label="Previous" onclick={handlePrevious} disabled={isPreviousDisabled}></lightning-button>
            <span class="slds-m-horizontal_medium">{currentPage} of {totalPages}</span>
            <lightning-button label="Next" onclick={handleNext} disabled={isNextDisabled}></lightning-button>
        </div>
    </lightning-card>
</template>
