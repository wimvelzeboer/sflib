<!-- SFLib Record Actions -->
<template>
    <lightning-card title={title} icon-name={iconName}>
        <div slot="actions" lwc:if={showMenu}>
            <lightning-button-group>
                <lightning-button-icon
                        lwc:if={showSearchIcon}
                        icon-name="utility:search"
                        variant="bare"
                        alternative-text="Search"
                        class="slds-p-right_small"
                        onclick={handleSearchToggle}
                ></lightning-button-icon>

                <lightning-button-menu alternative-text="Show Options" variant="bare" menu-alignment="right">
                    <lightning-menu-item
                            lwc:if={seeAllEnabled}
                            value="See All"
                            label={seeAllLabel}
                            onclick={handleSeeAll}
                            icon-name="utility:preview"
                    ></lightning-menu-item>
                    <lightning-menu-item
                            lwc:if={historyEnabled}
                            value="Show History"
                            label="Show History"
                            onclick={handleShowHistory}
                            icon-name="utility:archive"
                    ></lightning-menu-item>
                    <lightning-menu-item
                            lwc:if={isAdministrator}
                            value="Settings"
                            label="Settings"
                            icon-name="utility:settings"
                            onclick={handleShowSettings}
                    ></lightning-menu-item>
                </lightning-button-menu>
            </lightning-button-group>
        </div>
        <c-sflib-record-action-list
                record-id={recordId}
                variant={variant}
                see-all={seeAll}
                show-search-bar={showSearch}
        ></c-sflib-record-action-list>
    </lightning-card>
</template>
